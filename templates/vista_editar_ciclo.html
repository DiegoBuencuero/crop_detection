{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container-fluid py-3 px-4" style="max-width:600px">
  <h5 class="fw-bold mb-1">✏️ {% translate "Editar Ciclo" %}</h5>
  <p class="text-muted small mb-4">{{ ciclo.campo.nombre }} · {{ ciclo.campana }} · {{ ciclo.cultivo.nombre }}</p>

  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags }} alert-dismissible fade show py-2" role="alert">
    {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}

  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label small fw-semibold">{% translate "Nombre del lote" %}</label>
          <input type="text" name="nombre_lote" class="form-control" value="{{ ciclo.nombre_lote }}">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">{% translate "Superficie (ha)" %}</label>
          <input type="number" name="superficie_ha" class="form-control" step="0.01"
                 value="{{ ciclo.superficie_ha }}">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">{% translate "Fecha de inicio" %}</label>
          <input type="date" name="fecha_inicio" class="form-control"
                 value="{{ ciclo.fecha_inicio|date:'Y-m-d' }}">
        </div>
        <div class="mb-4">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="activa" value="1"
                   id="switch-activa" {% if ciclo.activa %}checked{% endif %}>
            <label class="form-check-label small" for="switch-activa">{% translate "Ciclo activo" %}</label>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success">{% translate "Guardar" %}</button>
          <a href="{% url 'vista_lista_ciclos' %}" class="btn btn-outline-secondary">{% translate "Cancelar" %}</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
